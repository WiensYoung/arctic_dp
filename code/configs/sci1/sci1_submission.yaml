# SCI一区投稿实验配置
# 使用方式: arctic-sci1 --config configs/sci1/sci1_submission.yaml
# CLI 参数可覆盖 YAML 中的任何字段。

profile: paper
seeds: 50

vessel:
  name: simplified_500t
  config_path: configs/vessels/simplified_500t.yaml

controllers:
  - pid
  - smc
  - precision
  - ice_aware
  - full
  - dob_nmpc
  - no_cbf
  - no_cvar
  - no_observer
  - no_fallback

scenarios:
  include_groups: [A, B, C, D, E, F]

output:
  root: results/sci1_submission
  save_traces: true
  save_figures: true

runtime:
  fail_fast: false

# 元数据 (记录在结果中, 不影响运行)
protocol: sci1_submission_v2
simulation:
  loop: sim_loop_unified
  ice_model: lindqvist_1989_proxy
  thruster: generic_dp_vessel
