# XueLong2-like vessel parameters
# NOTE: Publicly reported vessel scale only; NOT official DP-control or thruster parameters.
# Source: Publicly available vessel specifications, ice class reports.
# For paper experiments, calibrate thruster and damping parameters against
# published data or CFD/ice-tank tests.

name: xuelong2_like
source_note: >
  Publicly reported vessel scale only; not official DP-control or thruster parameters.
  Mass and inertia are engineering estimates based on displacement and length.

# Principal dimensions (publicly reported)
length_m: 122.5
beam_m: 22.32
draft_m: 7.85
displacement_t: 13996

# Derived (engineering estimate)
mass_kg: 13996000.0      # displacement * 1000
Iz_kgm2: null            # Not available; estimated from length^2 * mass * 0.15 in code

# Ice parameters (Lindqvist 1989 proxy, literature-calibrated)
ice_crushing_strength_mpa: 2.0    # Range: 1-5 MPa for first-year ice (ISO 19906)
ice_structure_factor: 0.45        # Lindqvist 1989
waterline_angle_deg: 30.0         # Typical ice-breaking bow angle

# Damping (engineering estimate, positive values)
# These are simplified linear+quadratic damping coefficients.
# Real values depend on speed, heading, and ice conditions.
Xu: 500.0       # surge linear (N·s/m)
Yv: 800.0       # sway linear (N·s/m)
Nr: 200000.0    # yaw linear (N·m·s/rad)
Xu_abs: 200.0   # surge quadratic (N·s²/m²)
Yv_abs: 300.0   # sway quadratic (N·s²/m²)
Nr_abs: 50000.0 # yaw quadratic (N·m·s²/rad²)

# Note: Current code uses simplified 500t model for simulation speed.
# For paper-quality results with XueLong2 scale, update mass_kg in VesselParams.
