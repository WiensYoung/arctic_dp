# Paper-full config — 50 seeds for publication
profile: paper
seeds: 50
controllers:
  - pid
  - smc
  - precision
  - ice_aware
  - full
  - nmpc
  - no_cbf
  - no_cvar
  - no_observer
  - no_fallback
  - oracle_full
scenarios:
  include_groups: [A, B, C, D, E, F, G]
vessel:
  config: configs/vessels/xuelong2_like.yaml
output:
  root: results/sci1_submission
  save_traces: true
  save_figures: true
runtime:
  fail_fast: false
  skip_missing_optional_controllers: true
protocol: sci1_submission_v3
simulation:
  loop: sim_loop_unified
  ice_model: lindqvist_1989_proxy
  thruster: generic_dp_vessel
