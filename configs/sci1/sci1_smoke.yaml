# Smoke test config — quick CI/CD validation
profile: smoke
seeds: 1
controllers:
  - pid
  - precision
  - ice_aware
  - full
  - no_cbf
  - no_cvar
  - no_observer
  - no_fallback
scenarios:
  include_groups: [A, B, C, D, E, F, G]
output:
  root: results/sci1_submission
  save_traces: false
  save_figures: true
runtime:
  fail_fast: false
  skip_missing_optional_controllers: true
